name: despliegue lamonega.com.ar

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - run: hugo --minify
        env:
          HUGO_ENVIRONMENT: production
          TZ: America/Argentina/Buenos_Aires

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: add vps to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: rsync to vps
        run: |
          rsync -az --delete --checksum \
            -e "ssh -o BatchMode=yes" \
            public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/blog/